{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StakeZenith | Aviator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; margin: 0; user-select: none; }
        
        /* Aviator Aesthetics */
        .bg-panel { background-color: #1b1c1d; }
        .bg-darker { background-color: #141516; }
        .bet-card { background-color: #2c2d30; border-radius: 12px; transition: all 0.3s ease; }
        .bet-card.active { border: 1px solid #dc3545; background-color: #3d2225; } 
        
        .multiplier { font-size: 5rem; font-weight: 900; text-shadow: 0px 4px 20px rgba(220, 20, 60, 0.4); z-index: 10; transition: transform 0.1s; }
        .pulse { transform: scale(1.05); }
        
        /* Button States with smooth transitions */
        .btn-base { border-radius: 12px; transition: all 0.1s ease; outline: none; }
        .btn-bet { background: linear-gradient(to bottom, #28a745, #1e7e34); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3); color: white; }
        .btn-bet:active:not(:disabled) { transform: translateY(2px); box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3); }
        .btn-bet:disabled { opacity: 0.8; cursor: not-allowed; }
        
        .btn-cancel { background: linear-gradient(to bottom, #dc3545, #a71d2a); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3); color: white; }
        .btn-cancel:active:not(:disabled) { transform: translateY(2px); box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3); }
        .btn-cancel:disabled { opacity: 0.8; cursor: not-allowed; }
        
        .btn-cashout { background: linear-gradient(to bottom, #ffc107, #d39e00); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3); color: #000; }
        .btn-cashout:active:not(:disabled) { transform: translateY(2px); box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3); }
        .btn-cashout:disabled { opacity: 0.8; cursor: not-allowed; }
        
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(3px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <audio id="flight-sound" src="{% static 'aviator.mpeg' %}" loop preload="auto"></audio>

    <header class="h-16 bg-[#1b1c1d] flex justify-between items-center px-2 md:px-4 border-b border-[#2c2d30] shrink-0">
        <div class="flex items-center gap-1">
            <span class="text-red-600 font-black italic text-xl md:text-2xl tracking-tighter">STAKE<span class="text-white">ZENITH</span></span>
        </div>
        
        <div class="flex items-center gap-1 md:gap-3">
            {% if user.is_authenticated %}
            <div class="flex items-center bg-[#2c2d30] rounded-full px-2 py-1 border border-gray-700">
                <div class="flex flex-col items-end leading-none">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Balance</span>
                    <span class="text-green-500 font-black text-xs md:text-sm whitespace-nowrap" id="balance-display">{{ user.aviatorprofile.balance|default:"0.00" }} KES</span>
                </div>
            </div>
            <button onclick="openDepositModal()" class="bg-gradient-to-b from-green-500 to-green-600 text-white px-3 py-1.5 md:px-4 md:py-2 font-black rounded-full text-[10px] md:text-xs uppercase shadow-md border border-green-400 transition-all active:scale-95">DEP</button>
            <button onclick="openWithdrawModal()" class="bg-gradient-to-b from-red-500 to-red-600 text-white px-3 py-1.5 md:px-4 md:py-2 font-black rounded-full text-[10px] md:text-xs uppercase shadow-md border border-red-400 transition-all active:scale-95">WITHDRAW</button>
            <button onclick="logout()" class="text-gray-400 hover:text-white p-1.5 md:p-2 bg-[#2c2d30] rounded-full transition-all active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            {% else %}
            <button onclick="document.getElementById('auth-modal').classList.remove('hidden')" class="bg-gradient-to-b from-blue-500 to-blue-600 px-5 py-2 font-black rounded-full text-xs uppercase shadow-md border border-blue-400 text-white">Login</button>
            {% endif %}
            
            <button class="text-gray-400 hover:text-white p-1 md:p-2 bg-[#2c2d30] rounded-full transition-all active:scale-95 ml-1">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </header>

    <div id="history-bar" class="bg-darker p-2 flex gap-2 overflow-x-auto no-scrollbar border-b border-black shrink-0">
        </div>

    <main class="flex-1 flex flex-col p-2 gap-2 overflow-hidden bg-black">
        
        <div class="bg-panel flex-1 rounded-2xl relative flex flex-col items-center justify-center border border-gray-800 overflow-hidden min-h-[220px]">
            <div id="status-text" class="absolute top-4 text-xs font-bold text-gray-400 uppercase tracking-widest z-10">Waiting for next round...</div>
            
            <div id="loader-bar" class="absolute top-10 w-48 h-1 bg-gray-800 rounded overflow-hidden z-10 hidden">
                <div id="loader-progress" class="h-full bg-red-600 w-0 transition-all duration-75"></div>
            </div>

            <div id="multiplier" class="multiplier text-red-500 hidden">1.00x</div>
            
            <div id="flew-away" class="hidden z-20 flex flex-col items-center absolute">
                <div class="text-red-500 uppercase font-black text-2xl md:text-3xl tracking-widest bg-black/70 px-6 py-2 rounded-full border-2 border-red-500 mb-2 shadow-[0_0_15px_rgba(255,0,0,0.5)]">Flew Away!</div>
                <span id="final-mult" class="text-5xl md:text-6xl font-black text-red-500 drop-shadow-[0_0_10px_rgba(255,0,0,0.8)]">1.12x</span>
            </div>

            <canvas id="flight-canvas" class="absolute inset-0 w-full h-full"></canvas>
            
            <svg id="plane" viewBox="0 0 100 100" class="absolute w-14 h-14 hidden z-10" style="fill:#d00; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5));">
                <path d="M96.7,46.2l-23-9.5l-29-30c-1.2-1.2-3.2-1.4-4.6-0.3l-5.6,4.3c-1.3,1-1.6,2.8-0.7,4.1l19.5,29.3L27.6,54L13,44.5 c-1-0.6-2.3-0.6-3.3,0l-6.8,4.1c-1.4,0.8-1.5,2.8-0.2,3.8l17.7,13.8L21,80.5c-0.3,1,0.5,2,1.6,2h11.1c0.7,0,1.4-0.4,1.8-1l7-10.7 l21.8-8.2l30.8,5.1c1.5,0.2,2.8-0.8,3.2-2.3l1.1-5C99.8,48.7,98.6,47,96.7,46.2z"/>
            </svg>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 shrink-0">
            <div id="panel-1" class="bet-card p-2 flex flex-col gap-2 border border-gray-700">
                <div class="flex items-center gap-2 bg-black rounded-lg p-1 border border-gray-800">
                    <button onclick="adjustBet(1, -50)" class="text-gray-400 w-10 h-10 font-bold text-xl rounded-full bg-[#1b1c1d] hover:bg-gray-800 transition-colors">-</button>
                    <input type="number" id="bet-input-1" value="100" class="bg-transparent w-full text-center font-bold text-lg outline-none">
                    <button onclick="adjustBet(1, 50)" class="text-gray-400 w-10 h-10 font-bold text-xl rounded-full bg-[#1b1c1d] hover:bg-gray-800 transition-colors">+</button>
                </div>
                <div class="grid grid-cols-4 gap-1">
                    <button onclick="setBet(1, 50)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800 hover:border-gray-500">50</button>
                    <button onclick="setBet(1, 200)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800 hover:border-gray-500">200</button>
                    <button onclick="setBet(1, 500)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800 hover:border-gray-500">500</button>
                    <button onclick="setBet(1, 1000)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800 hover:border-gray-500">1000</button>
                </div>
                <button id="btn-bet-1" onclick="handleBetAction(1)" class="btn-base btn-bet h-16 w-full flex flex-col items-center justify-center">
                    <span id="btn-title-1" class="font-black text-2xl leading-none flex items-center gap-2">BET</span>
                    <span id="btn-sub-1" class="text-[10px] font-bold mt-1">100.00 KES</span>
                </button>
            </div>

            <div id="panel-2" class="bet-card p-2 flex-col gap-2 border border-gray-700 hidden md:flex">
                <div class="flex items-center gap-2 bg-black rounded-lg p-1 border border-gray-800">
                    <button onclick="adjustBet(2, -50)" class="text-gray-400 w-10 h-10 font-bold text-xl rounded-full bg-[#1b1c1d] hover:bg-gray-800 transition-colors">-</button>
                    <input type="number" id="bet-input-2" value="200" class="bg-transparent w-full text-center font-bold text-lg outline-none">
                    <button onclick="adjustBet(2, 50)" class="text-gray-400 w-10 h-10 font-bold text-xl rounded-full bg-[#1b1c1d] hover:bg-gray-800 transition-colors">+</button>
                </div>
                <div class="grid grid-cols-4 gap-1">
                    <button onclick="setBet(2, 200)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800">200</button>
                    <button onclick="setBet(2, 500)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800">500</button>
                    <button onclick="setBet(2, 1000)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800">1000</button>
                    <button onclick="setBet(2, 5000)" class="bg-black text-gray-400 text-xs py-1.5 rounded-lg font-bold border border-gray-800">5000</button>
                </div>
                <button id="btn-bet-2" onclick="handleBetAction(2)" class="btn-base btn-bet h-16 w-full flex flex-col items-center justify-center">
                    <span id="btn-title-2" class="font-black text-2xl leading-none flex items-center gap-2">BET</span>
                    <span id="btn-sub-2" class="text-[10px] font-bold mt-1">200.00 KES</span>
                </button>
            </div>
        </div>

        <div class="bg-panel rounded-lg flex-1 border border-gray-800 flex flex-col overflow-hidden min-h-[100px]">
            <div class="flex justify-between items-center bg-[#2c2d30] px-3 py-1.5">
                <span class="text-[10px] font-bold text-gray-400 uppercase">All Bets</span>
                <span class="text-gray-500 text-[10px]" id="live-bet-count">15,822 Bets</span>
            </div>
            <div id="live-bets" class="overflow-y-auto no-scrollbar p-2 space-y-1"></div>
        </div>
    </main>

    <div id="deposit-modal" class="fixed inset-0 modal-overlay hidden z-50 flex justify-center items-center p-4">
        <div class="bg-[#1b1c1d] w-full max-w-sm rounded-2xl p-6 border border-gray-700 relative shadow-2xl">
            <button onclick="document.getElementById('deposit-modal').classList.add('hidden')" class="absolute top-3 right-5 text-gray-500 text-2xl hover:text-white">&times;</button>
            <h2 class="text-xl font-black mb-6 text-green-500 text-center uppercase tracking-widest">Fund Account</h2>
            
            <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">Amount (Min KES 50)</label>
            <input type="number" id="dep-amt" placeholder="50" class="w-full bg-black border border-gray-700 text-white rounded-xl p-4 mb-4 outline-none text-center text-lg font-bold focus:border-green-500">
            
            <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">M-Pesa Number</label>
            <input type="text" id="dep-phone" placeholder="07XX XXX XXX" class="w-full bg-black border border-gray-700 text-white rounded-xl p-4 mb-8 outline-none text-center font-bold focus:border-green-500">
            
            <button onclick="initiateDeposit()" id="dep-btn" class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-400 text-white py-4 font-black rounded-xl shadow-[0_0_15px_rgba(40,167,69,0.4)] flex justify-center items-center gap-2">PUSH TO PHONE</button>
        </div>
    </div>

    <div id="withdraw-modal" class="fixed inset-0 modal-overlay hidden z-50 flex justify-center items-center p-4">
        <div class="bg-[#1b1c1d] w-full max-w-sm rounded-2xl p-6 border border-gray-700 relative shadow-2xl">
            <button onclick="document.getElementById('withdraw-modal').classList.add('hidden')" class="absolute top-3 right-5 text-gray-500 text-2xl hover:text-white">&times;</button>
            <h2 class="text-xl font-black mb-6 text-red-500 text-center uppercase tracking-widest">Withdraw Funds</h2>
            
            <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">Amount to Withdraw</label>
            <input type="number" id="with-amt" placeholder="50" class="w-full bg-black border border-gray-700 text-white rounded-xl p-4 mb-8 outline-none text-center text-lg font-bold focus:border-red-500">
            
            <button onclick="initiateWithdraw()" id="with-btn" class="w-full bg-gradient-to-r from-red-500 to-red-600 hover:from-red-400 text-white py-4 font-black rounded-xl shadow-[0_0_15px_rgba(220,53,69,0.4)] flex justify-center items-center gap-2">WITHDRAW</button>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 modal-overlay hidden z-50 flex justify-center items-center p-4">
        <div class="bg-[#1b1c1d] w-full max-w-sm rounded-2xl p-6 border border-gray-700 relative shadow-2xl">
            <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="absolute top-3 right-5 text-gray-500 text-2xl hover:text-white">&times;</button>
            <h2 class="text-xl font-black mb-6 text-center uppercase tracking-widest text-blue-500">Account Access</h2>
            <input type="text" id="auth-user" placeholder="Username" class="w-full bg-black border border-gray-700 text-white rounded-xl p-4 mb-3 outline-none focus:border-blue-500">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-black border border-gray-700 text-white rounded-xl p-4 mb-6 outline-none focus:border-blue-500">
            <button onclick="handleAuth('login')" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 font-black mb-2 rounded-xl flex justify-center items-center gap-2">LOGIN</button>
            <button onclick="handleAuth('register')" class="w-full bg-[#2c2d30] text-white py-4 font-black rounded-xl border border-gray-600 flex justify-center items-center gap-2">REGISTER</button>
        </div>
    </div>

    <template id="spinner-svg">
        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </template>

    <script>
        const csrfToken = '{{ csrf_token }}';
        const isAuth = "{{ user.is_authenticated }}" === "True";
        const spinnerHTML = document.getElementById('spinner-svg').innerHTML;
        const flightSound = document.getElementById('flight-sound');

        // --- ADMIN CRASH SEQUENCE ---
        // The game will perfectly hit these exact multipliers sequentially.
        const crashSequence = [1.12, 2.45, 1.05, 5.50, 1.80, 1.00, 3.45, 12.00, 1.20, 2.10, 5.00, 1.50, 1.30, 4.20, 1.00, 6.00, 14.00, 1.10, 2.00, 1.00, 8.50];
        let currentSequenceIndex = 0; 

        // --- CORE GAME STATE ---
        let gameState = 'waiting'; 
        let currentMultiplier = 1.0;
        let globalFleePoint = 1.0; 
        let startTime = 0;
        let animationFrame;
        let bgOffset = 0;

        let bets = {
            1: { state: 'idle', amount: 0 }, 
            2: { state: 'idle', amount: 0 }
        };

        const canvas = document.getElementById('flight-canvas');
        const ctx = canvas.getContext('2d');
        const plane = document.getElementById('plane');
        const multDisplay = document.getElementById('multiplier');
        const flewAway = document.getElementById('flew-away');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader-bar');
        const progress = document.getElementById('loader-progress');
        const balEl = document.getElementById('balance-display');

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize);
        resize();

        function getCurrentBalance() {
            let text = balEl.innerText.replace(/,/g, '').replace(' KES', '');
            let parsed = parseFloat(text);
            return isNaN(parsed) ? 0 : parsed;
        }

        function setBet(panel, val) { 
            if(bets[panel].state !== 'idle') return;
            document.getElementById(`bet-input-${panel}`).value = val; 
            document.getElementById(`btn-sub-${panel}`).innerText = val.toFixed(2) + ' KES';
        }
        function adjustBet(panel, amt) {
            if(bets[panel].state !== 'idle') return;
            const input = document.getElementById(`bet-input-${panel}`);
            let val = parseFloat(input.value) + amt;
            if(val < 10) val = 10;
            input.value = val;
            document.getElementById(`btn-sub-${panel}`).innerText = val.toFixed(2) + ' KES';
        }

        function openDepositModal() { document.getElementById('deposit-modal').classList.remove('hidden'); }
        
        function openWithdrawModal() { 
            if(!isAuth) return document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('withdraw-modal').classList.remove('hidden'); 
        }

        // --- BET & SUCCESSFUL CASHOUT LOGIC ---
        async function handleBetAction(panelId) {
            if(!isAuth) return document.getElementById('auth-modal').classList.remove('hidden');
            
            const betObj = bets[panelId];
            const btn = document.getElementById(`btn-bet-${panelId}`);
            const title = document.getElementById(`btn-title-${panelId}`);
            const sub = document.getElementById(`btn-sub-${panelId}`);
            const panelDiv = document.getElementById(`panel-${panelId}`);
            const amt = parseFloat(document.getElementById(`bet-input-${panelId}`).value);

            if(betObj.state === 'idle') {
                if(gameState === 'flying' || gameState === 'crashed') return;

                let currentBal = getCurrentBalance();
                if(currentBal < amt) {
                    Swal.fire({title: 'Insufficient Funds', text: 'Please deposit to place this bet.', icon: 'warning', background: '#1b1c1d', color: '#fff'});
                    openDepositModal();
                    return;
                }

                btn.disabled = true;
                title.innerHTML = `${spinnerHTML} WAIT`;
                sub.innerText = "PROCESSING...";

                await new Promise(r => setTimeout(r, 200));

                currentBal = getCurrentBalance();
                if(currentBal < amt) {
                    btn.disabled = false; title.innerHTML = "BET"; sub.innerText = amt.toFixed(2) + ' KES';
                    return Swal.fire({title: 'Insufficient Funds', icon: 'error', background: '#1b1c1d', color: '#fff'});
                }

                betObj.state = 'waiting';
                betObj.amount = amt;
                balEl.innerText = (currentBal - amt).toFixed(2) + ' KES';

                btn.disabled = false;
                btn.className = "btn-base btn-cancel h-16 w-full flex flex-col items-center justify-center";
                title.innerHTML = "CANCEL";
                sub.innerText = "Waiting for next round";
                panelDiv.classList.add('active');
            }
            else if(betObj.state === 'waiting') {
                if(gameState === 'loading' || gameState === 'waiting') {
                    btn.disabled = true; title.innerHTML = `${spinnerHTML}`; sub.innerText = "CANCELLING...";
                    await new Promise(r => setTimeout(r, 200));

                    let currentBal = getCurrentBalance();
                    balEl.innerText = (currentBal + betObj.amount).toFixed(2) + ' KES';
                    
                    betObj.state = 'idle'; betObj.amount = 0;
                    
                    btn.disabled = false;
                    btn.className = "btn-base btn-bet h-16 w-full flex flex-col items-center justify-center";
                    title.innerHTML = "BET"; sub.innerText = document.getElementById(`bet-input-${panelId}`).value + '.00 KES';
                    panelDiv.classList.remove('active');
                }
            }
            else if(betObj.state === 'in_play') {
                if(gameState === 'flying') {
                    // SUCCESSFUL CASHOUT LOGIC
                    btn.disabled = true;
                    title.innerHTML = `${spinnerHTML} WAIT`;
                    sub.innerText = "CASHING OUT...";
                    
                    let winAmt = betObj.amount * currentMultiplier;
                    let currentBal = getCurrentBalance();
                    balEl.innerText = (currentBal + winAmt).toFixed(2) + ' KES';
                    
                    betObj.state = 'idle';
                    betObj.amount = 0;
                    
                    btn.disabled = false;
                    btn.className = "btn-base btn-bet h-16 w-full flex flex-col items-center justify-center";
                    title.innerHTML = "BET";
                    sub.innerText = document.getElementById(`bet-input-${panelId}`).value + '.00 KES';
                    panelDiv.classList.remove('active');

                    Swal.fire({
                        title: 'Cashed Out!', 
                        text: `You won ${winAmt.toFixed(2)} KES`, 
                        icon: 'success', 
                        background: '#1b1c1d', 
                        color: '#fff', 
                        timer: 2000, 
                        showConfirmButton: false
                    });
                }
            }
        }

        // --- RIGGED FAKE WITHDRAWAL ---
        function initiateWithdraw() {
            const amt = parseFloat(document.getElementById('with-amt').value);
            const btn = document.getElementById('with-btn');
            let currentBal = getCurrentBalance();
            
            if(!amt || amt < 50) return Swal.fire({title: 'Wait', text: 'Min withdrawal is KES 50', icon: 'warning', background: '#1b1c1d', color: '#fff'});
            if(amt > currentBal) return Swal.fire({title: 'Failed', text: 'Insufficient Balance', icon: 'error', background: '#1b1c1d', color: '#fff'});
            
            btn.disabled = true;
            btn.innerHTML = `${spinnerHTML} PROCESSING...`;
            
            setTimeout(() => {
                // Deduct balance anyway
                balEl.innerText = (currentBal - amt).toFixed(2) + ' KES';
                
                // Show Error
                Swal.fire({
                    title: 'Withdrawal Failed', 
                    text: 'Error processing transaction with M-Pesa gateway. Please contact support.', 
                    icon: 'error', 
                    background: '#1b1c1d', 
                    color: '#fff'
                });
                
                document.getElementById('withdraw-modal').classList.add('hidden');
                btn.disabled = false;
                btn.innerHTML = "WITHDRAW";
            }, 2000);
        }

        // --- FLIGHT ENGINE ---
        function startLoading() {
            gameState = 'loading';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            plane.classList.add('hidden');
            multDisplay.classList.add('hidden');
            flewAway.classList.add('hidden');
            statusText.classList.remove('hidden');
            loader.classList.remove('hidden');

            [1, 2].forEach(p => {
                if(bets[p].state === 'idle') {
                    const btn = document.getElementById(`btn-bet-${p}`);
                    btn.className = "btn-base btn-bet h-16 w-full flex flex-col items-center justify-center";
                    document.getElementById(`btn-title-${p}`).innerHTML = "BET";
                    document.getElementById(`btn-sub-${p}`).innerText = document.getElementById(`bet-input-${p}`).value + '.00 KES';
                    document.getElementById(`panel-${p}`).classList.remove('active');
                }
            });

            progress.style.width = '0%';
            let p = 0;
            const interval = setInterval(() => {
                p += 2;
                progress.style.width = p + '%';
                if(p >= 100) { clearInterval(interval); loader.classList.add('hidden'); startFlight(); }
            }, 50); 
        }

        async function startFlight() {
            gameState = 'flying';
            startTime = Date.now();
            currentMultiplier = 1.0;
            
            // PLAY SOUND
            flightSound.currentTime = 0;
            flightSound.play().catch(e => console.log("Audio autoplay blocked by browser. User must click first."));

            plane.classList.remove('hidden');
            multDisplay.classList.remove('hidden');
            multDisplay.style.color = '#fff';
            statusText.classList.add('hidden');
            
            // ADMIN RIGGED SEQUENCE: Pick next exact value
            globalFleePoint = crashSequence[currentSequenceIndex % crashSequence.length];
            currentSequenceIndex++; 

            for (let p of [1, 2]) {
                if(bets[p].state === 'waiting') {
                    bets[p].state = 'in_play';
                    const btn = document.getElementById(`btn-bet-${p}`);
                    btn.className = "btn-base btn-cashout h-16 w-full flex flex-col items-center justify-center";
                    document.getElementById(`btn-title-${p}`).innerHTML = "<span class='text-black'>CASH OUT</span>";
                }
            }
            flightLoop();
        }

        function flightLoop() {
            if (gameState !== 'flying') return;
            
            let elapsed = (Date.now() - startTime) / 1000;
            currentMultiplier = Math.pow(1.08, elapsed * 4);
            
            // THE SNAP FIX: If we passed the targeted sequence, force snap to it
            if (currentMultiplier >= globalFleePoint) { 
                currentMultiplier = parseFloat(globalFleePoint); 
                multDisplay.innerText = currentMultiplier.toFixed(2) + 'x';
                crash(); 
                return; 
            }

            multDisplay.innerText = currentMultiplier.toFixed(2) + 'x';

            if (Math.floor(elapsed * 10) % 5 === 0) multDisplay.classList.add('pulse');
            else multDisplay.classList.remove('pulse');

            [1, 2].forEach(p => {
                if(bets[p].state === 'in_play') {
                    const btnTitle = document.getElementById(`btn-title-${p}`);
                    if(!btnTitle.innerHTML.includes('svg')) {
                        document.getElementById(`btn-sub-${p}`).innerText = (bets[p].amount * currentMultiplier).toFixed(2) + ' KES';
                    }
                }
            });

            drawCurve(elapsed);
            animationFrame = requestAnimationFrame(flightLoop);
        }

        function drawCurve(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            bgOffset -= 2 + (t * 2);
            if(bgOffset < -40) bgOffset = 0;
            ctx.beginPath();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.moveTo(i + bgOffset, 0);
                ctx.lineTo(i + bgOffset, canvas.height);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = '#d00';
            ctx.lineWidth = 5;
            ctx.moveTo(0, canvas.height);

            let x = Math.min(canvas.width * 0.8, t * 60);
            let y = canvas.height - Math.min(canvas.height * 0.8, Math.pow(t, 2) * 8);

            ctx.quadraticCurveTo(x * 0.5, canvas.height, x, y);
            ctx.lineTo(x, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fillStyle = 'rgba(220, 0, 0, 0.2)';
            ctx.fill();
            ctx.stroke();

            let wobble = Math.sin(Date.now() / 100) * 2;
            plane.style.left = (x - 20) + 'px';
            plane.style.top = (y - 30 + wobble) + 'px';
            plane.style.transform = `rotate(-${Math.min(25, t*2)}deg)`;
        }

        function crash() {
            gameState = 'crashed';
            cancelAnimationFrame(animationFrame);
            
            // STOP SOUND
            flightSound.pause();

            multDisplay.classList.add('hidden');
            multDisplay.classList.remove('pulse');
            plane.classList.add('hidden');
            
            flewAway.classList.remove('hidden');
            document.getElementById('final-mult').innerText = currentMultiplier.toFixed(2) + 'x';

            [1, 2].forEach(p => {
                if(bets[p].state === 'in_play') {
                    bets[p].state = 'idle';
                    bets[p].amount = 0;
                    const btn = document.getElementById(`btn-bet-${p}`);
                    btn.disabled = false;
                    document.getElementById(`panel-${p}`).classList.remove('active');
                }
            });

            const historyBar = document.getElementById('history-bar');
            const span = document.createElement('span');
            span.className = `bg-[#1b1c1d] px-3 py-0.5 rounded-full text-xs font-bold shrink-0 ${currentMultiplier > 2 ? 'text-purple-400' : 'text-blue-400'}`;
            span.innerText = currentMultiplier.toFixed(2) + 'x';
            historyBar.prepend(span);
            if(historyBar.children.length > 15) historyBar.lastChild.remove();

            setTimeout(startLoading, 3000);
        }

        setTimeout(startLoading, 1000);

        // --- FAKE LIVE BETS FEED ---
        const liveBets = document.getElementById('live-bets');
        const betCount = document.getElementById('live-bet-count');
        let currentBetCount = 15822;
        const names = ['Kevo***', 'Otile_1', 'JaneD', 'Wanja99', 'Sultan', 'Chief254', 'BrianO'];
        
        setInterval(() => {
            currentBetCount += Math.floor(Math.random() * 3);
            betCount.innerText = currentBetCount.toLocaleString() + ' Bets';

            const row = document.createElement('div');
            row.className = "flex justify-between items-center bg-[#1b1c1d] p-1.5 rounded border border-gray-800 text-[10px]";
            const user = names[Math.floor(Math.random()*names.length)];
            const amt = Math.floor(Math.random() * 2000 + 50);
            
            if(Math.random() > 0.6 && gameState === 'flying') {
                const mult = (Math.random() * (currentMultiplier - 1) + 1.01).toFixed(2);
                row.innerHTML = `<div class="flex gap-2 w-1/3"><span class="text-gray-400">${user}</span></div>
                                 <div class="w-1/3 text-center text-gray-400">${amt} KES</div>
                                 <div class="w-1/3 text-right"><span class="bg-[#28a745]/20 text-green-500 px-2 py-0.5 rounded-full font-bold">${mult}x</span></div>`;
            } else {
                row.innerHTML = `<div class="flex gap-2 w-1/3"><span class="text-gray-400">${user}</span></div>
                                 <div class="w-1/3 text-center text-gray-400">${amt} KES</div>
                                 <div class="w-1/3 text-right text-gray-600 font-bold">-</div>`;
            }
            liveBets.prepend(row);
            if(liveBets.children.length > 15) liveBets.lastChild.remove();
        }, 1200);

        // --- AUTH & DEPOSIT (M-PESA) ---
        async function handleAuth(action) {
            const user = document.getElementById('auth-user').value;
            const pass = document.getElementById('auth-pass').value;
            const btn = document.querySelector(`#auth-modal button[onclick="handleAuth('${action}')"]`);
            if(!user || !pass) return Swal.fire({title: 'Error', text: 'Fill all fields', icon: 'error', background: '#1b1c1d', color: '#fff'});
            btn.innerHTML = `${spinnerHTML} ${action.toUpperCase()}ING...`; btn.disabled = true;
            const res = await fetch(action === 'login' ? '/api/login/' : '/api/register/', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.success) location.reload();
            else { Swal.fire({title: 'Failed', text: data.message, icon: 'error', background: '#1b1c1d', color: '#fff'}); btn.innerHTML = action.toUpperCase(); btn.disabled = false; }
        }

        async function logout() { await fetch('/api/logout/', {method: 'POST', headers: {'X-CSRFToken': csrfToken}}); location.reload(); }

        async function initiateDeposit() {
            const amt = parseFloat(document.getElementById('dep-amt').value);
            const phone = document.getElementById('dep-phone').value;
            const btn = document.getElementById('dep-btn');
            
            if(!amt || !phone) return Swal.fire({title: 'Wait', text: 'Enter amount and phone', icon: 'warning', background: '#1b1c1d', color: '#fff'});
            if(amt < 50) return Swal.fire({title: 'Minimum Deposit', text: 'Min deposit is KES 50.', icon: 'error', background: '#1b1c1d', color: '#fff'});
            
            btn.disabled = true; btn.innerHTML = `${spinnerHTML} PROCESSING...`;
            try {
                const res = await fetch('/initiate-payment/', {
                    method: 'POST', headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
                    body: JSON.stringify({ phone_number: phone, amount: amt })
                });
                const d = await res.json();
                if(d.success) {
                    Swal.fire({title: 'STK Sent!', text: 'Enter M-Pesa PIN on your phone.', icon: 'info', showConfirmButton: false, background: '#1b1c1d', color: '#fff'});
                    pollStatus(d.checkout_request_id);
                } else throw new Error(d.message);
            } catch(e) {
                Swal.fire({title: 'Error', text: e.message, icon: 'error', background: '#1b1c1d', color: '#fff'});
                btn.disabled = false; btn.innerHTML = "PUSH TO PHONE";
            }
        }

        function pollStatus(id) {
            const timer = setInterval(async () => {
                const res = await fetch(`/check-status/${id}/`);
                const d = await res.json();
                if(d.status === 'COMPLETED') { clearInterval(timer); location.reload(); }
            }, 5000);
        }
    </script>
